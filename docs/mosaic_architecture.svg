<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8F4F1"/>
    </linearGradient>
    <linearGradient id="accentFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D9A3A0"/>
      <stop offset="1" stop-color="#C97C74"/>
    </linearGradient>
    <linearGradient id="blueFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#DDE7F0"/>
      <stop offset="1" stop-color="#8FA7BF"/>
    </linearGradient>
    <linearGradient id="greenFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E5ECD9"/>
      <stop offset="1" stop-color="#A9B88F"/>
    </linearGradient>
    <linearGradient id="taupeFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EFE5DB"/>
      <stop offset="1" stop-color="#C7B299"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#5B4C44" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#A89389"/>
    </marker>
  </defs>

  <rect x="18" y="18" width="1164" height="724" rx="32" fill="url(#panel)" stroke="#E7DFD9"/>

  <text x="62" y="84" fill="#B6645C" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="0.18em">MOSAIC</text>
  <text x="62" y="126" fill="#292321" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Prompt-aware mixture-of-experts inference</text>
  <text x="62" y="160" fill="#746C68" font-family="Segoe UI, Arial, sans-serif" font-size="18">Species and methylation-type prompts steer expert routing, while routed experts produce interpretable methylation predictions.</text>

  <g filter="url(#shadow)">
    <rect x="62" y="214" width="202" height="140" rx="24" fill="#FFFFFF" stroke="#E7DFD9"/>
    <text x="92" y="252" fill="#B6645C" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0.08em">INPUT WINDOW</text>
    <rect x="92" y="278" width="142" height="42" rx="12" fill="#FBF8F6" stroke="#E7DFD9"/>
    <text x="106" y="304" fill="#292321" font-family="Consolas, monospace" font-size="14">ATTTTGACCTG...</text>
    <text x="92" y="337" fill="#746C68" font-family="Segoe UI, Arial, sans-serif" font-size="14">41-bp DNA sequence</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="320" y="214" width="246" height="178" rx="24" fill="#FFFFFF" stroke="#E7DFD9"/>
    <text x="350" y="252" fill="#59738D" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0.08em">DNABERT2 ENCODER</text>
    <rect x="350" y="277" width="186" height="34" rx="12" fill="#EDF3F8" stroke="#D8E1E9"/>
    <text x="374" y="299" fill="#3A4F61" font-family="Segoe UI, Arial, sans-serif" font-size="14">Tokenizer + contextual encoder</text>
    <rect x="350" y="324" width="186" height="44" rx="12" fill="#FBF8F6" stroke="#E7DFD9"/>
    <text x="379" y="350" fill="#292321" font-family="Segoe UI, Arial, sans-serif" font-size="15">Pooled feature  h</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="198" width="246" height="210" rx="24" fill="#FFFFFF" stroke="#E7DFD9"/>
    <text x="650" y="236" fill="#B6645C" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0.08em">PROMPT-AWARE ROUTER</text>
    <rect x="650" y="262" width="186" height="36" rx="12" fill="#F4ECE8" stroke="#E6D9D3"/>
    <text x="696" y="285" fill="#5E4E48" font-family="Segoe UI, Arial, sans-serif" font-size="14">h + task + species</text>
    <rect x="650" y="312" width="186" height="36" rx="12" fill="#EDF3F8" stroke="#D8E1E9"/>
    <text x="704" y="335" fill="#3A4F61" font-family="Segoe UI, Arial, sans-serif" font-size="14">Linear + softmax</text>
    <rect x="650" y="362" width="186" height="30" rx="10" fill="#EEF3E8" stroke="#DDE6D0"/>
    <text x="714" y="382" fill="#556644" font-family="Segoe UI, Arial, sans-serif" font-size="13">Top-k routing</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="910" y="214" width="228" height="298" rx="24" fill="#FFFFFF" stroke="#E7DFD9"/>
    <text x="940" y="252" fill="#59738D" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0.08em">ROUTED EXPERTS</text>

    <rect x="940" y="278" width="168" height="48" rx="14" fill="url(#accentFill)" fill-opacity="0.22" stroke="#D9A3A0"/>
    <text x="960" y="300" fill="#7E4A44" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Expert 1</text>
    <text x="960" y="317" fill="#7E4A44" font-family="Segoe UI, Arial, sans-serif" font-size="12">LoRA-adapted classification head</text>

    <rect x="940" y="342" width="168" height="48" rx="14" fill="url(#blueFill)" fill-opacity="0.22" stroke="#AFC0D1"/>
    <text x="960" y="364" fill="#43596B" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Expert 2</text>
    <text x="960" y="381" fill="#43596B" font-family="Segoe UI, Arial, sans-serif" font-size="12">Backup route / information sharing</text>

    <rect x="940" y="406" width="168" height="48" rx="14" fill="url(#greenFill)" fill-opacity="0.26" stroke="#BFD0A7"/>
    <text x="960" y="428" fill="#556644" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Expert k</text>
    <text x="960" y="445" fill="#556644" font-family="Segoe UI, Arial, sans-serif" font-size="12">Additional sparse experts</text>

    <rect x="940" y="470" width="168" height="28" rx="10" fill="#FBF8F6" stroke="#E7DFD9"/>
    <text x="1004" y="489" fill="#746C68" font-family="Segoe UI, Arial, sans-serif" font-size="13">Weighted fusion</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="794" y="572" width="344" height="108" rx="24" fill="#FFFFFF" stroke="#E7DFD9"/>
    <text x="824" y="610" fill="#B6645C" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0.08em">OUTPUTS</text>
    <rect x="824" y="628" width="136" height="30" rx="10" fill="#F4ECE8" stroke="#E6D9D3"/>
    <text x="846" y="648" fill="#5E4E48" font-family="Segoe UI, Arial, sans-serif" font-size="13">Methylation probability</text>
    <rect x="972" y="628" width="136" height="30" rx="10" fill="#EDF3F8" stroke="#D8E1E9"/>
    <text x="997" y="648" fill="#43596B" font-family="Segoe UI, Arial, sans-serif" font-size="13">Top routed experts</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="356" y="494" width="262" height="150" rx="24" fill="#FFFFFF" stroke="#E7DFD9"/>
    <text x="386" y="532" fill="#556644" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0.08em">PROMPT SIGNALS</text>

    <rect x="386" y="556" width="92" height="34" rx="12" fill="url(#accentFill)" fill-opacity="0.18" stroke="#D9A3A0"/>
    <text x="413" y="578" fill="#7E4A44" font-family="Segoe UI, Arial, sans-serif" font-size="14">Task</text>

    <rect x="490" y="556" width="98" height="34" rx="12" fill="url(#taupeFill)" fill-opacity="0.18" stroke="#D3C2AF"/>
    <text x="513" y="578" fill="#745E4D" font-family="Segoe UI, Arial, sans-serif" font-size="14">Species</text>

    <text x="386" y="620" fill="#746C68" font-family="Segoe UI, Arial, sans-serif" font-size="13">Learned prompt embeddings modulate router input before expert selection.</text>
  </g>

  <line x1="264" y1="284" x2="320" y2="284" stroke="#A89389" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="566" y1="330" x2="620" y2="330" stroke="#A89389" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="866" y1="330" x2="910" y2="330" stroke="#A89389" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1024" y1="512" x2="1024" y2="572" stroke="#A89389" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="488" y1="494" x2="488" y2="392" stroke="#A89389" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="618" y1="569" x2="794" y2="626" stroke="#A89389" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="74" y="697" fill="#746C68" font-family="Segoe UI, Arial, sans-serif" font-size="13">Deployed web workflow: choose task and species prompts, upload a processed dataset or a full DNA sequence, and export both predictions and the normalized processed windows.</text>
</svg>
